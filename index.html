<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Me - لوحة التحكم</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJTL9TWvvFg2yQsCB-amzmzu58TNzQrFk",
            authDomain: "connectme-65a90.firebaseapp.com",
            databaseURL: "https://connectme-65a90-default-rtdb.firebaseio.com",
            projectId: "connectme-65a90",
            storageBucket: "connectme-65a90.firebasestorage.app",
            messagingSenderId: "70213529271",
            appId: "1:70213529271:web:95e13143e4b800200b6732"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.dbRef = ref;
        window.dbGet = get;
    </script>
    <style>
        :root { --primary: #7c3aed; --secondary: #db2777; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #4c1d95 0%, #a21caf 100%); min-height: 100vh; margin: 0; padding: 20px; color: #fff; box-sizing: border-box; }
        
        /* تنسيق الشعار */
        .logo-ring { width: 90px; height: 90px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; border: 3px solid transparent; background-image: linear-gradient(white, white), linear-gradient(45deg, #2563eb, #d946ef); background-origin: border-box; background-clip: content-box, border-box; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .logo-text { font-weight: 900; line-height: 1.1; text-align: center; }
        .logo-text .top-txt { color: #1e3a8a; font-size: 12px; display: block; letter-spacing: 0.5px; font-family: sans-serif; }
        .logo-text .bottom-txt { color: #d946ef; font-size: 22px; display: block; margin-top: -2px; font-family: sans-serif; }
        
        .container { max-width: 450px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.95); color: #333; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .package-box { background: linear-gradient(90deg, #6d28d9, #db2777); color: white; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; font-size: 24px; margin: 15px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: #f3f4f6; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-val { font-size: 18px; font-weight: bold; color: #4c1d95; }
        .progress-container { background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: #7c3aed; height: 100%; width: 0%; transition: 0.5s; }
        .btn-whatsapp { width: 100%; padding: 15px; background: #059669; color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }
        #viewDashboard { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button.login { width: 100%; padding: 12px; background: #7c3aed; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-ring">
        <div class="logo-text">
            <span class="top-txt">CONNECT</span>
            <span class="bottom-txt">me</span>
        </div>
    </div>

    <div id="viewLogin" class="card" style="display: block;">
        <h2 style="text-align: center; color: #7c3aed; margin-top: 0;">تسجيل الدخول</h2>
        <input type="text" id="userInp" placeholder="اسم المستخدم">
        <input type="password" id="passInp" placeholder="كلمة المرور">
        <button class="login" id="actionLogin">دخول</button>
    </div>

    <div id="viewDashboard">
        <div class="card" style="background: transparent; color: white; box-shadow: none; padding: 10px 0; margin-bottom: 5px;">
            <h3 id="helloUser" style="margin: 0 0 5px 0;">مرحباً بك 👋</h3>
            <div style="background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 12px; font-weight: bold;">الاشتراك نشط</div>
        </div>

        <div class="package-box" id="resPackage">نوع الباقة</div>

        <div class="grid">
            <div class="card stat-card"><div>الرصيد الحالي</div><div class="stat-val" id="resBalance">0</div></div>
            <div class="card stat-card"><div>الاستهلاك</div><div class="stat-val" id="resCons">0</div></div>
        </div>

        <div class="card">
            <div>الأيام المتبقية</div>
            <div class="stat-val" id="resDays" style="font-size: 24px;">0 يوم</div>
            <div class="progress-container"><div class="progress-bar" id="progBar"></div></div>
        </div>

        <a href="https://wa.me/963957869853" class="btn-whatsapp" target="_blank">طلب تجديد عبر واتساب</a>
    </div>
</div>

<script type="module">
    // دالة تنظيف الرموز غير المسموحة في مسارات الفايربيز
    function cleanUsername(key) {
        const illegalChars = ['.', '$', '[', ']', '#', '/'];
        let newKey = String(key);
        illegalChars.forEach(char => { newKey = newKey.split(char).join('_'); });
        return newKey;
    }

    // دالة تنسيق الأرقام بفاصلة الآلاف
    function formatBalance(val) {
        let num = parseFloat(val);
        if (isNaN(num)) return val;
        return num.toLocaleString('en-US');
    }

    // دالة تقريب أرقام الاستهلاك الكبيرة
    function formatUsage(val) {
        let strVal = String(val || "0");
        let match = strVal.match(/[\d.]+/);
        if (!match) return val;
        
        let num = parseFloat(match[0]);
        let rounded = Math.round(num * 10) / 10; 
        return strVal.replace(match[0], rounded);
    }

    document.getElementById('actionLogin').addEventListener('click', async function() {
        // جلب القيم المدخلة كما كتبها المستخدم تماماً (بالنقطة)
        const rawUsername = document.getElementById('userInp').value.trim(); 
        const rawPassword = document.getElementById('passInp').value.trim();
        
        // ذكاء المطابقة: نقوم بتنظيف الطرفين مؤقتاً أثناء الفحص، 
        // بحيث لو كتب المستخدم (a.jaush) في الخانتين، سيتم قبولها فوراً وتتطابق برمجيًا
        if(cleanUsername(rawUsername) !== cleanUsername(rawPassword)) {
            return alert("خطأ: تأكد من البيانات");
        }

        // تحويل الاسم المدخل للصيغة المخزنة بالفايربيز لجلب البيانات بنجاح
        const firebaseKey = cleanUsername(rawUsername);

        try {
            const snapshot = await window.dbGet(window.dbRef(window.db, 'users/' + firebaseKey));
            if (snapshot.exists()) {
                const data = snapshot.val();
                
                // عرض الاسم الأصلي بالنقطة كما هو في جدول الإكسل عند الترحيب بالعميل
                document.getElementById('helloUser').innerText = `مرحباً بك: ${rawUsername}`;
                document.getElementById('resPackage').innerText = data.package;
                
                // عرض القيم بعد معالجتها بالفاصلة والتقريب
                document.getElementById('resBalance').innerText = formatBalance(data.balance);
                document.getElementById('resCons').innerText = formatUsage(data.usage);
                document.getElementById('resDays').innerText = data.daysRemaining + " يوم";
                
                const percent = Math.min((data.daysRemaining / 30) * 100, 100);
                document.getElementById('progBar').style.width = percent + "%";

                document.getElementById('viewLogin').style.display = 'none';
                document.getElementById('viewDashboard').style.display = 'block';
            } else {
                alert("المستخدم غير موجود");
            }
        } catch(e) { alert("خطأ في الاتصال"); }
    });
</script>
</body>
</html>
