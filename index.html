<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Me - بوابة المشتركين</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJTL9TWvvFg2yQsCB-amzmzu58TNzQrFk",
            authDomain: "connectme-65a90.firebaseapp.com",
            databaseURL: "https://connectme-65a90-default-rtdb.firebaseio.com",
            projectId: "connectme-65a90",
            storageBucket: "connectme-65a90.firebasestorage.app",
            messagingSenderId: "70213529271",
            appId: "1:70213529271:web:95e13143e4b800200b6732",
            measurementId: "G-NQTN9JJK9R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbGet = get;
        window.dbChild = child;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        body { background: linear-gradient(135deg, #2b0951 0%, #680566 50%, #b30068 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; box-sizing: border-box; direction: rtl; }
        .wrapper { width: 100%; max-width: 400px; text-align: center; }
        .logo-ring { width: 95px; height: 95px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; border: 3px solid transparent; background-image: linear-gradient(white, white), linear-gradient(45deg, #2563eb, #d946ef); background-origin: border-box; background-clip: content-box, border-box; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .logo-text { font-weight: 900; line-height: 1.1; }
        .logo-text .top-txt { color: #1e3a8a; font-size: 13px; display: block; letter-spacing: 0.5px; }
        .logo-text .bottom-txt { color: #d946ef; font-size: 24px; display: block; margin-top: -2px; }
        .app-title { color: #ffffff; font-size: 24px; font-weight: bold; margin: 0 0 5px 0; letter-spacing: 1px; }
        .app-subtitle { color: #e2e8f0; font-size: 13px; margin-bottom: 25px; }
        .app-card { background: #ffffff; border-radius: 24px; padding: 35px 25px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); text-align: right; display: none; animation: slideUp 0.4s ease forwards; }
        .app-card.active { display: block; }
        .form-control { width: 100%; padding: 13px 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 15px; color: #1e293b; outline: none; box-sizing: border-box; text-align: center; }
        .btn-gradient { width: 100%; padding: 14px; background: linear-gradient(90deg, #d946ef 0%, #2563eb 100%); border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; }
        .dashboard-theme { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(12px); color: white; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .floating-gear { position: fixed; bottom: 20px; right: 20px; background: rgba(255, 255, 255, 0.15); padding: 12px; border-radius: 50%; cursor: pointer; color: white; border: none; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-body { background: #2d0b3d; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; color: white; }
        .upload-lbl { background: #db2777; padding: 12px 25px; border-radius: 25px; display: inline-block; cursor: pointer; }
        #status-box { margin-top: 15px; font-size: 12px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 8px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-ring"><div class="logo-text"><span class="top-txt">CONNECT</span><span class="bottom-txt">me</span></div></div>
        <div class="app-title">CONNECT ME</div>
        <div class="app-subtitle">بوابة بيانات المشتركين</div>

        <div id="viewLogin" class="app-card active">
            <div class="form-group"><label>اسم المستخدم</label><input type="text" id="userInp" class="form-control" placeholder="أدخل اسم الشبكة"></div>
            <div class="form-group"><label>كلمة المرور</label><input type="password" id="passInp" class="form-control" placeholder="••••••••"></div>
            <button class="btn-gradient" id="actionLogin">دخول</button>
        </div>

        <div id="viewDashboard" class="app-card dashboard-theme">
            <h3 id="helloUser" style="text-align: center; color: #d946ef;">✨ مرحباً بك</h3>
            <div class="data-row"><span class="data-label">الباقة</span><span class="data-value" id="resProfile">-</span></div>
            <div class="data-row"><span class="data-label">الرصيد</span><span class="data-value" id="resBalance">-</span></div>
            <div class="data-row"><span class="data-label">الأيام</span><span class="data-value" id="resDays">-</span></div>
            <div class="data-row"><span class="data-label">الاستهلاك</span><span class="data-value" id="resCons">-</span></div>
            <button class="btn-gradient" id="actionLogout" style="margin-top: 20px; background: rgba(255,255,255,0.15);">تسجيل الخروج</button>
        </div>
    </div>

    <button class="floating-gear" id="actionGear">⚙️</button>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-body">
            <h3>🔐 لوحة الإدارة</h3>
            <label for="excelInput" class="upload-lbl">📂 اختر ملف Excel</label>
            <input type="file" id="excelInput" accept=".xlsx" style="display: none;">
            <div id="status-box" style="display: none;"></div>
            <button id="closeModal" style="margin-top: 15px; background:none; border:none; color:#ccc;">إغلاق</button>
        </div>
    </div>

    <script type="module">
        const viewLogin = document.getElementById('viewLogin');
        const viewDashboard = document.getElementById('viewDashboard');
        const adminModal = document.getElementById('adminModal');
        const statusBox = document.getElementById('status-box');

        // دالة تنظيف الاسم
        function cleanUsername(key) {
            const illegalChars = ['.', '$', '[', ']', '#', '/'];
            let newKey = String(key);
            illegalChars.forEach(char => { newKey = newKey.split(char).join('_'); });
            return newKey;
        }

        // تسجيل الدخول
        document.getElementById('actionLogin').addEventListener('click', async function() {
            const username = cleanUsername(document.getElementById('userInp').value.trim());
            const password = document.getElementById('passInp').value.trim();
            
            if(username !== password) return alert("❌ خطأ: يجب مطابقة اسم المستخدم وكلمة المرور.");

            try {
                const snapshot = await window.dbGet(window.dbRef(window.db, 'users/' + username));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('helloUser').innerText = `✨ مرحباً بك: ${username}`;
                    document.getElementById('resProfile').innerText = data.package;
                    document.getElementById('resBalance').innerText = data.balance;
                    document.getElementById('resDays').innerText = data.daysRemaining;
                    document.getElementById('resCons').innerText = data.usage;
                    viewLogin.classList.remove('active');
                    viewDashboard.classList.add('active');
                } else {
                    alert("❌ هذا المستخدم غير مسجل.");
                }
            } catch(e) { console.error(e); alert("خطأ في الاتصال."); }
        });

        // رفع الملف
        document.getElementById('excelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            statusBox.style.display = "block";
            statusBox.innerHTML = "⏳ جاري الرفع...";
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const rows = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, { type: 'array' }).Sheets[0]);
                for (const row of rows) {
                    const user = cleanUsername(String(row['username'] || "").trim());
                    if (user && user !== "0") {
                        await window.dbSet(window.dbRef(window.db, 'users/' + user), {
                            package: row['الباقة'] || "Gold",
                            balance: row['رصيد المشترك الحالي'] || 0,
                            daysRemaining: row['عدد الايام'] || 0,
                            usage: row['الاستهلاك'] || "0"
                        });
                    }
                }
                statusBox.innerHTML = "✅ تم تحديث البيانات بنجاح!";
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('actionGear').addEventListener('click', () => { if(prompt("كلمة المرور؟") === "123") adminModal.style.display = "flex"; });
        document.getElementById('closeModal').addEventListener('click', () => adminModal.style.display = "none");
        document.getElementById('actionLogout').addEventListener('click', () => { viewDashboard.classList.remove('active'); viewLogin.classList.add('active'); });
    </script>
</body>
</html>
