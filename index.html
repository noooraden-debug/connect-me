<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Me - بوابة المشتركين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #2b0951 0%, #680566 50%, #b30068 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            direction: rtl;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* تصميم اللوجو الدائري المتطابق */
        .logo-ring {
            width: 95px;
            height: 95px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            border: 3px solid transparent;
            background-image: linear-gradient(white, white), linear-gradient(45deg, #2563eb, #d946ef);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .logo-text {
            font-weight: 900;
            line-height: 1.1;
        }
        .logo-text .top-txt { color: #1e3a8a; font-size: 13px; display: block; letter-spacing: 0.5px; }
        .logo-text .bottom-txt { color: #d946ef; font-size: 24px; display: block; margin-top: -2px; }

        .app-title {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }

        .app-subtitle {
            color: #e2e8f0;
            font-size: 13px;
            margin-bottom: 25px;
        }

        /* واجهات العرض والكروت الناعمة */
        .app-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: right;
            display: none;
            animation: slideUp 0.4s ease forwards;
        }

        .app-card.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #64748b;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 13px 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #1e293b;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: #9333ea;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(147, 51, 234, 0.1);
        }

        .btn-gradient {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #d946ef 0%, #2563eb 100%);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
            transition: 0.2s;
        }

        .btn-gradient:hover {
            opacity: 0.95;
            transform: translateY(-0.5px);
        }

        .hint-container {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-top: 15px;
        }

        /* كارت استعلام المشترك */
        .dashboard-theme {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .dashboard-theme label { color: #cbd5e1; }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .data-row:last-of-type { border: none; }
        .data-label { color: #cbd5e1; font-size: 14px; }
        .data-value { font-weight: bold; font-size: 16px; }

        /* الترس العائم أسفل الزاوية اليمنى */
        .floating-gear {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 999;
        }
        .floating-gear:hover {
            background: #db2777;
            transform: rotate(60deg);
        }

        /* نافذة الإدارة المنبثقة */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-body {
            background: linear-gradient(135deg, #1f1a3a 0%, #2d0b3d 100%);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .upload-lbl {
            background: #db2777;
            padding: 12px 25px;
            border-radius: 25px;
            display: inline-block;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        #status-box {
            margin-top: 15px;
            font-size: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-ring">
            <div class="logo-text">
                <span class="top-txt">CONNECT</span>
                <span class="bottom-txt">me</span>
            </div>
        </div>
        <div class="app-title">CONNECT ME</div>
        <div class="app-subtitle">بوابة بيانات المشتركين</div>

        <div id="viewLogin" class="app-card active">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="userInp" class="form-control" placeholder="أدخل اسم الشبكة">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="passInp" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn-gradient" id="actionLogin">دخول</button>
            <div class="hint-container">
                💡 اسم المستخدم وكلمة المرور = اسم الشبكة
            </div>
        </div>

        <div id="viewDashboard" class="app-card dashboard-theme">
            <h3 id="helloUser" style="margin-top: 0; margin-bottom: 20px; text-align: center; color: #d946ef;">✨ مرحباً بك</h3>
            <div class="data-row">
                <span class="data-label">الباقة / البروفايل</span>
                <span class="data-value" id="resProfile">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">الرصيد المتبقي</span>
                <span class="data-value" id="resBalance" style="color:#67e8f9;">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">الأيام المتبقية</span>
                <span class="data-value" id="resDays">-</span>
            </div>
            <div class="data-row">
                <span class="data-label">الاستهلاك الحالي</span>
                <span class="data-value" id="resCons" style="color:#4ade80;">-</span>
            </div>
            <button class="btn-gradient" id="actionLogout" style="margin-top: 20px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);">تسجيل الخروج</button>
        </div>
    </div>

    <button class="floating-gear" id="actionGear">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-body">
            <h3 style="margin-top: 0;">🔐 لوحة رفع الحسابات</h3>
            <p style="font-size: 12px; color: #cbd5e1;">يرجى اختيار ملف الميكروتيك المصفى لتحديث قاعدة البيانات فوراً</p>
            
            <label for="excelInput" class="upload-lbl">📂 اختر ملف Excel</label>
            <input type="file" id="excelInput" accept=".xlsx, .xls, .xlsm" style="display: none;">
            
            <div id="status-box" style="display: none;"></div>
            <button id="closeModal" style="margin-top: 15px; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 13px;">إغلاق النافذة</button>
        </div>
    </div>

<script>
    // التكوين الأساسي المباشر
    const CONFIG_URL = "https://xnftfwjffsyknghhoqcb.supabase.co";
    const CONFIG_KEY = "sb_publishable_oXbMAYE2-l5P3KIHYuAbPQ_XGJh8lZx"; 
    
    const ADMIN_PASS = "123"; // كلمة مرور الترس

    let client = null;
    try {
        if (typeof supabase !== 'undefined' && CONFIG_KEY.length > 10) {
            client = supabase.createClient(CONFIG_URL, CONFIG_KEY);
        }
    } catch(e) { console.error("فشل تهيئة سوبابيز", e); }

    const viewLogin = document.getElementById('viewLogin');
    const viewDashboard = document.getElementById('viewDashboard');
    const adminModal = document.getElementById('adminModal');
    const statusBox = document.getElementById('status-box');

    // 1. تسجيل الدخول للمشترك
    document.getElementById('actionLogin').addEventListener('click', async function() {
        const username = document.getElementById('userInp').value.trim();
        const password = document.getElementById('passInp').value.trim();

        if(!username || !password) {
            alert("⚠️ فضلاً، أدخل اسم المستخدم وكلمة المرور.");
            return;
        }
        if(username !== password) {
            alert("❌ خطأ: كلمة المرور يجب أن تكون مطابقة تماماً لاسم المستخدم (اسم الشبكة).");
            return;
        }
        if(!client) {
            alert("❌ خطأ فني: التطبيق لم ينجح في تأسيس الاتصال. يرجى التأكد من أن مفتاح الـ API كامل وليس مقطوعاً.");
            return;
        }

        try {
            const { data, error } = await client.from('subscribers').select('*');
            if (error) throw error;

            const userRow = data.find(sub => {
                const dbName = String(sub.username || sub.Username || "").toLowerCase();
                return dbName === username.toLowerCase();
            });

            if (userRow) {
                document.getElementById('helloUser').innerText = `✨ مرحباً بك: ${userRow.username || userRow.Username}`;
                document.getElementById('resProfile').innerText = userRow.profile || "غير محدد";
                document.getElementById('resBalance').innerText = `${userRow.balance ?? 0} ل.س`;
                document.getElementById('resDays').innerText = `${userRow.days_remaining ?? 0} أيام`;
                document.getElementById('resCons').innerText = userRow.consumption || "0.0 GB";

                viewLogin.classList.remove('active');
                viewDashboard.classList.add('active');
            } else {
                alert("❌ عذراً، اسم المستخدم هذا غير مسجل بالنظام حالياً.");
            }
        } catch(err) {
            alert(`❌ فشل الاتصال بقاعدة البيانات. السبب: ${err.message}`);
        }
    });

    // تسجيل الخروج
    document.getElementById('actionLogout').addEventListener('click', function() {
        document.getElementById('userInp').value = "";
        document.getElementById('passInp').value = "";
        viewDashboard.classList.remove('active');
        viewLogin.classList.add('active');
    });

    // 2. التحكم بالترس الإداري
    document.getElementById('actionGear').addEventListener('click', function() {
        const askPass = prompt("🔐 الرجاء إدخال رمز التحقق الخاص بالإدارة:");
        if (askPass === null) return;
        
        if (askPass === ADMIN_PASS) {
            adminModal.style.display = "flex";
            statusBox.style.display = "none";
        } else {
            alert("❌ رمز التحقق غير صحيح!");
        }
    });

    document.getElementById('closeModal').addEventListener('click', function() {
        adminModal.style.display = "none";
    });

    // 3. رفع ملف الاكسيل والرفع المباشر
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        if(!client) {
            statusBox.style.display = "block";
            statusBox.innerHTML = "<span style='color:#ef4444;'>❌ لا يمكن الرفع بسبب خلل في مفتاح الاتصال بالسيرفر.</span>";
            return;
        }

        statusBox.style.display = "block";
        statusBox.innerHTML = "⏳ جاري قراءة وتحليل ملف الاكسيل...";

        const reader = new FileReader();
        reader.onload = async function(evt) {
            try {
                const dataArr = new Uint8Array(evt.target.result);
                const workBook = XLSX.read(dataArr, { type: 'array' });
                const sheet = workBook.Sheets[workBook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false });

                if (!rows || rows.length <= 1) {
                    statusBox.innerHTML = "<span style='color:#ef4444;'>❌ الملف المختار فارغ من البيانات.</span>";
                    return;
                }

                const { data: sample } = await client.from('subscribers').select('*').limit(1);
                const columns = sample && sample.length > 0 ? Object.keys(sample[0]) : ['username'];

                statusBox.innerHTML = "🧹 جاري تصفير وتنظيف البيانات القديمة من المنظومة...";
                let clearQuery = client.from('subscribers').delete();
                if (columns.includes('id')) clearQuery = clearQuery.gt('id', 0);
                else clearQuery = clearQuery.neq('username', '');
                await clearQuery;

                statusBox.innerHTML = "🚀 جاري ضخ وتحديث بيانات المشتركين الجدد...";
                const batchList = [];

                for (let i = 1; i < rows.length; i++) {
                    const r = rows[i];
                    if (r && r[0] !== undefined && r[0] !== null) {
                        const userVal = String(r[0]).trim();
                        if (userVal !== "" && userVal !== "اسم الشبكة" && userVal.toLowerCase() !== "login" && !userVal.startsWith('=')) {
                            
                            let consVal = "0.0 GB";
                            if (r[7] !== undefined && r[7] !== null) {
                                consVal = String(r[7]).trim();
                                if (!consVal.toLowerCase().match(/(gb|mib|gib|mb)/)) consVal += " GB";
                            }

                            const record = {};
                            if (columns.includes('username')) record['username'] = userVal;
                            if (columns.includes('Username')) record['Username'] = userVal;
                            
                            if (columns.includes('profile')) record['profile'] = r[1] ? String(r[1]).trim() : "غير محدد";
                            if (columns.includes('balance')) record['balance'] = r[3] ? parseFloat(r[3]) : 0;
                            if (columns.includes('days_remaining')) record['days_remaining'] = r[6] ? parseInt(r[6]) : 0;
                            if (columns.includes('consumption')) record['consumption'] = consVal;

                            batchList.push(record);
                        }
                    }
                }

                const { error: pushErr } = await client.from('subscribers').insert(batchList);
                if (pushErr) throw pushErr;

                statusBox.innerHTML = `<span style='color:#4ade80;'>✅ نجاح باهر ومكتمل! تم رفع وتغذية المنظومة بـ (${batchList.length}) مشترك.</span>`;
                setTimeout(() => { adminModal.style.display = "none"; }, 1800);

            } catch(err) {
                statusBox.innerHTML = `<span style='color:#ef4444;'>❌ فشلت العملية: ${err.message}</span>`;
            }
        };
        reader.readAsArrayBuffer(file);
    });
</script>
</body>
</html>
